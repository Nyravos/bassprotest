                        <h2 class="text-blue-400 tracking-[0.2em] mb-4 uppercase text-sm font-semibold">${config.chapterMeta}</h2>
                        <h1 class="serif text-5xl font-black mb-12 tracking-tight text-white">${config.chapterTitle}</h1>
                        <button onclick="changeState('narrative')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">开始阅读</button>
                    </div>`;
            } else if (currentState === 'narrative') {
                app.innerHTML = `
                    <div class="fade-in flex flex-col items-start">
                        <p class="serif text-xl leading-relaxed text-slate-200 mb-12">${config.openingText}</p>
                        <button onclick="changeState('quiz')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase self-center">握紧钓竿 →</button>
                    </div>`;
            } else if (currentState === 'quiz') {
                const q = config.questions[currentQIndex];
                let localIndex = (currentQIndex % 5) + 1; 
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">${config.chapterMeta}</span>
                            <span class="text-[10px] text-slate-500 font-mono">${localIndex} / 5</span>
                        </div>
                        <div class="h-1 w-full bg-white/5 mb-12 rounded-full overflow-hidden">
                            <div class="progress-bar h-full bg-blue-500" style="width: ${localIndex / 5 * 100}%"></div>
                        </div>
                        <h2 class="serif text-2xl font-bold mb-10 text-white leading-snug">${q.q}</h2>
                        <div class="space-y-4">
                            ${q.options.map((o, i) => `<button onclick="handleAnswer(${i})" class="option-btn w-full p-5 text-left rounded-2xl text-slate-300 hover:text-white transition-all text-sm leading-relaxed">${o.t}</button>`).join('')}
                        </div>
                    </div>`;
            } else if (currentState === 'end') {
                // 如果当前完成了第 2 章（也就是答完了第 10 题），由于还没有第 3 章，这里就不显示“迈向下一阶段”的按钮
                                // 根据当前的章节，决定下一个蓝色按钮带玩家去哪
                let btnHtml = "";
                if (activeChapter === 1) {
                    btnHtml = `<button onclick="enterNextChapter(2, 'Chapter 2 — First Contact', 'Reading The Fish', '[这里填第2章开场叙事文字]')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">进入第二章 →</button>`;
                } else if (activeChapter === 2) {
                    btnHtml = `<button onclick="enterNextChapter(3, 'Chapter 3 — Struggle', 'The Slow Hours', '时间来到中午。<br><br>太阳已经升高，风向开始变化。<br><br>刚刚那些 follow、subtle bite 和水面动静都慢慢变少了。<br><br>你已经有一段时间没口，湖开始变安静。<br><br>你开始意识到：真正困难的时间，到了。')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">进入第三章 →</button>`;

                } else if (activeChapter === 3) {
                    btnHtml = `<button onclick="enterNextChapter(4, 'Chapter 4 — The Turn', 'Adapting', '[这里填第4章开场叙事文字]')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">进入第四章 →</button>`;
                } else if (activeChapter === 4) {
                    btnHtml = `<button onclick="enterNextChapter(5, 'Chapter 5 — Last Cast', 'Sunset Decision', '[这里填第5章开场叙事文字]')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">进入第五章 →</button>`;
                } else if (activeChapter === 5) {
                    // 第五章做完，证明全盘通关，这里可以触发最终的“查看测试结果”
                    btnHtml = `<button onclick="alert('恭喜你解锁全盘隐藏数据！最终人格分析报告正在孵化中...')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">查看最终人格档案 →</button>`;
                }

        }

        window.changeState = (s) => { currentState = s; render(); };
        
        // 丝滑切入第二章的专属按钮逻辑
               // 万能换章函数：只要告诉它章号、大标题、小标题和开场白，它就能自动把网页切过去！
        window.enterNextChapter = (chNum, meta, title, opening) => {
            activeChapter = chNum;
            config.chapterMeta = meta;
            config.chapterTitle = title;
            config.openingText = opening;
            
            // 每次换章，把题目指针调整到该章的第一题
            currentQIndex = (chNum - 1) * 5; 
            
            currentState = 'chapter_start';
            render();
        };


        window.handleAnswer = (i) => {
            const opt = config.questions[currentQIndex].options[i];
            for (let k in opt.s) { scores.archetypes[k] += opt.s[k]; }
            for (let k in opt.tr) { scores.traits[k] += opt.tr[k]; }
            
            // 💡 自动卡点逻辑：当打完每章的第5题（索引为 4, 9, 14, 19, 24）时，强制停下来切入 Ending
            if (currentQIndex === 4) {
                // 第一章完结
                currentState = 'end';
                render();
            } else if (currentQIndex === 9) {
                // 第二章完结
                currentState = 'end';
                render();
         } else if (currentQIndex === 14) {
    // 第三章完结
    config.endingText = `下午的风开始变化。<br><br>云层慢慢移动。<br><br>远处岸边，突然出现了一些新的 bait movement。<br><br>湖好像：重新“活”了一点。<br><br>你知道：今天真正的窗口，可能还没结束。`;
    currentState = 'end';
    render();
}
else if (currentQIndex === 19) {
                // 第四章完结
                config.endingText = `[这里是 Chapter 4 的谢幕叙事占位符]`;
                currentState = 'end';
                render();
            } else if (currentQIndex === 24) {
                // 第五章完结 -> 这就是最后一章了！
                config.endingText = `全天做钓结束，收竿回岸。<br><br>你的鲈钓人格档案已成功建立。`;
                currentState = 'end';
                render();
            } else {
                // 其他情况，无缝进入下一题
                currentQIndex++;
                render();
            }
        };

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bass Fishing Personality Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&family=Inter:wght@300;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: all 1.5s ease; background-color: #0f172a; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .bg-deep { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #f8fafc; }
        
        /* 答题选项按钮样式 */
        .option-btn { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }
        .option-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); transform: translateX(4px); }
        
        /* 统一的页面跳转/下一步导航按钮样式 */
        .nav-btn { transition: all 0.3s ease; border: 1px solid rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.05); color: #60a5fa; }
        .nav-btn:hover { background: #60a5fa; color: #0f172a; transform: scale(1.03); box-shadow: 0 4px 20px rgba(96, 165, 250, 0.2); }

        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-deep min-h-screen">
    <div id="app" class="max-w-2xl mx-auto min-h-screen flex flex-col p-6 py-12">
        <!-- 动态内容渲染 -->
    </div>

    <script>
        let scores = {
            archetypes: { scientist: 0, rhythm: 0, heavy: 0, precision: 0, bigBite: 0, chaos: 0, tackle: 0, surface: 0 },
            traits: { environmentalAwareness: 0, flowDependence: 0, aggression: 0, interactionSensitivity: 0, narrativeDrive: 0, experimentation: 0, tackleAttachment: 0, emotionalResponse: 0, logicBias: 0, patternCommitment: 0, emotionalVolatility: 0 }
        };

        const config = {
            cover: {
                sub: "One Day On The Water",
                title: "鲈钓人格档案", /* 已修改为鲈钓 */
                desc: "这不是一场考试，而是一次对本能的追溯。"
            },
            intro: {
                title: "出钓须知",
                content: `
                    水面瞬息万变，第一直觉往往就是最真实的你。<br><br>
                    记住：<br>
                    • <b>落竿无悔</b>：测试中无法返回上一题，请尊重你的第一本能。<br>
                    • <b>放轻松</b>：这里没有所谓的“正确答案”。<br>
                    • <b>沉浸其中</b>：想象你正站在那个清晨的岸边。
                `
            },
            chapter: "Chapter 1 — Arrival",
            chapterTitle: "The First Cast",
            opening: `清晨 5:42。<br><br>你第一次来到这个湖。昨晚刚下过小雨，空气有点潮。风不大，但水面偶尔有波纹。<br><br>岸边有零散草区、一些倒木，远处能看到饵鱼的动向。<br><br>天还没完全亮。你站在岸边，准备开始今天的第一杆。`,
            questions: [
                {
                    q: "Q1 — 此时此刻，你的第一反应最像：",
                    options: [
                        { t: "先观察风向、水色 and bait movement", s: { scientist: 2 }, tr: { environmentalAwareness: 2 } },
                        { t: "拿 moving bait 快速 search 一圈", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "直接去最复杂的 cover 区域", s: { heavy: 2 }, tr: { aggression: 1 } },
                        { t: "用 finesse 先试 fish mood", s: { precision: 2 }, tr: { interactionSensitivity: 1 } },
                        { t: "拿 swimbait 赌清晨窗口", s: { bigBite: 2 }, tr: { narrativeDrive: 2 } },
                        { t: "想试最近新学的东西", s: { chaos: 2 }, tr: { experimentation: 2 } },
                        { t: "先确认今天哪几套装备最合理", s: { tackle: 2 }, tr: { tackleAttachment: 2 } }
                    ]
                },
                {
                    q: "Q2 — 真正准备开始时，你最自然会先拿起：",
                    options: [
                        { t: "Moving bait rod (搜索竿)", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "Finesse / ST rod (精细竿)", s: { precision: 2 }, tr: { interactionSensitivity: 1 } },
                        { t: "Heavy cover setup (重型路亚)", s: { heavy: 2 }, tr: { aggression: 1 } },
                        { t: "Swimbait setup (大饵装备)", s: { bigBite: 2 }, tr: { narrativeDrive: 1 } },
                        { t: "Topwater rod (水面系)", s: { surface: 2 }, tr: { emotionalResponse: 1 } },
                        { t: "一边纠结一边换来换去", s: { chaos: 1, tackle: 1 }, tr: { experimentation: 1 } },
                        { t: "根据水况重新思考整个体系", s: { scientist: 1, tackle: 1 }, tr: { environmentalAwareness: 1 } }
                    ]
                },
                {
                    q: "Q3 — 刚走到第一个标点，远处突然一下小炸水，但很快恢复安静。你会：",
                    options: [
                        { t: "马上加快节奏 search", s: { rhythm: 2 }, tr: { aggression: 1 } },
                        { t: "开始观察 bait movement", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "觉得可能有大鱼在附近", s: { bigBite: 2 }, tr: { narrativeDrive: 1 } },
                        { t: "想办法做更 subtle 的 interaction", s: { precision: 2 }, tr: { interactionSensitivity: 1 } },
                        { t: "第一反应是换 topwater", s: { surface: 2 }, tr: { emotionalResponse: 1 } },
                        { t: "怀疑只是小鱼 chasing bait", s: { scientist: 1 }, tr: { logicBias: 1 } }
                    ]
                },
                {
                    q: "Q4 — 前 20 分钟没口，你现在的状态最接近：",
                    options: [
                        { t: "“再坚持一下这个节奏。”", s: { rhythm: 1 }, tr: { patternCommitment: 2 } },
                        { t: "“可能今天鱼的位置不对。”", s: { scientist: 1 }, tr: { environmentalAwareness: 1 } },
                        { t: "“换个完全不同的东西试试。”", s: { chaos: 2 }, tr: { experimentation: 2 } },
                        { t: "“是不是应该慢下来。”", s: { precision: 1 }, tr: { interactionSensitivity: 1 } },
                        { t: "“会不会根本没有窗口。”", s: { bigBite: 1 }, tr: { emotionalVolatility: 2 } },
                        { t: "开始想是不是装备没配好", s: { tackle: 2 }, tr: { tackleAttachment: 2 } }
                    ]
                },
                {
                    q: "Q5 — 你看到旁边的人已经连中两条，你第一反应是：",
                    options: [
                        { t: "“他应该找到 pattern 了。”", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "“他的节奏可能是对的。”", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "“我想知道他用什么。”", s: { tackle: 2 }, tr: { tackleAttachment: 2 } },
                        { t: "“我是不是也该换地方。”", s: { chaos: 1 }, tr: { experimentation: 1 } },
                        { t: "“我还是想坚持自己的思路。”", s: { precision: 1, heavy: 1 }, tr: { patternCommitment: 2 } },
                        { t: "“会不会大鱼窗口来了。”", s: { bigBite: 2 }, tr: { narrativeDrive: 1 } }
                    ]
                },
                                // === 以下为 CHAPTER 2 的全新题库零件 ===
                {
                    ch: 2,
                    q: "Q6 (Ch2-Q1) — 你看到一条鱼跟到了岸边，明显对饵有兴趣，但最后没咬。你第一反应是：",
                    options: [
                        { t: "改变 cadence 再试一次", s: { precision: 2 }, tr: { interactionSensitivity: 2 } },
                        { t: "换另一个 moving bait 保持节奏", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "觉得它只是没进入真正的窗口期", s: { bigBite: 1, scientist: 1 }, tr: { narrativeDrive: 1 } },
                        { t: "想换一个更 subtle 的 presentation", s: { precision: 1 }, tr: { experimentation: 1 } },
                        { t: "第一反应是：“至少说明这里有鱼。”", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "突然很想赌它等会儿还会回来咬", s: { surface: 1, bigBite: 1 }, tr: { emotionalVolatility: 1 } }
                    ]
                },
                {
                    ch: 2,
                    q: "Q7 (Ch2-Q2) — 终于迎来今天第一个真正 bite，但 set hook 没挂住。那一下之后，你的情绪更接近：",
                    options: [
                        { t: "很想马上再次复制那个 interaction", s: { precision: 2 }, tr: { interactionSensitivity: 2 } },
                        { t: "开始思考刚刚 retrieve rhythm 哪里不对", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "有点上头，做钓风格开始变激进", s: { heavy: 1, surface: 1 }, tr: { emotionalVolatility: 2 } },
                        { t: "会开始想：“那可能是今天最大的一条鱼。”", s: { bigBite: 2 }, tr: { narrativeDrive: 2 } },
                        { t: "更在意它刚刚为什么会咬（水流/阴影/停顿？）", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "想马上换个完全不同的东西抛过去", s: { chaos: 2 }, tr: { experimentation: 2 } }
                    ]
                },
                {
                    ch: 2,
                    q: "Q8 (Ch2-Q3) — 接下来半小时有鱼跟但始终不开口，你更可能：",
                    options: [
                        { t: "不断微调节奏和停顿时间", s: { precision: 2 }, tr: { interactionSensitivity: 2 } },
                        { t: "保持现在的 flow，相信窗口总会打开", s: { rhythm: 2 }, tr: { patternCommitment: 1 } },
                        { t: "开始想是不是 spot 的问题，考虑移动", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "换成更有存在感、更有压迫力的 presentation", s: { heavy: 1, rhythm: 1 }, tr: { aggression: 1 } },
                        { t: "想赌一口激进的 reaction bite", s: { surface: 1, bigBite: 1 }, tr: { narrativeDrive: 1 } },
                        { t: "开始尝试奇奇怪怪的新东西", s: { chaos: 2 }, tr: { experimentation: 2 } }
                    ]
                },
                {
                    ch: 2,
                    q: "Q9 (Ch2-Q4) — 你终于钓到今天第一条鱼，不算大但状态很好。你第一反应是：",
                    options: [
                        { t: "“终于读对了一点鱼的心思。”", s: { precision: 2 }, tr: { interactionSensitivity: 1 } },
                        { t: "“今天这个节奏（rhythm）应该是成立的。”", s: { rhythm: 2 }, tr: { flowDependence: 1 } },
                        { t: "“这证明这个区域的鱼很有活性。”", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "“既然有小的，大的肯定也在附近。”", s: { bigBite: 2 }, tr: { narrativeDrive: 1 } },
                        { t: "“有底气了，我想试试能不能玩水面系炸水。”", s: { surface: 2 }, tr: { emotionalResponse: 1 } },
                        { t: "“现在想换另一个玩法试试了。”", s: { chaos: 2 }, tr: { experimentation: 2 } }
                    ]
                },
                {
                    ch: 2,
                    q: "Q10 (Ch2-Q5) — 接近中午时感受到一次极其微弱的 line tick，不确定是不是 bite。那一瞬间你最享受的是：",
                    options: [
                        { t: "“心跳加速，interaction 真的发生了。”", s: { precision: 2 }, tr: { interactionSensitivity: 2 } },
                        { t: "“心流没断，做钓节奏终于接上了。”", s: { rhythm: 2 }, tr: { flowDependence: 2 } },
                        { t: "“博弈开始，它终于暴露位置了。”", s: { scientist: 2 }, tr: { environmentalAwareness: 1 } },
                        { t: "“这种电击般的未知瞬间，比纯粹中鱼还上头。”", s: { surface: 1, bigBite: 1 }, tr: { emotionalResponse: 2 } },
                        { t: "“逻辑推导，我想知道它为什么现在才愿意碰。”", s: { scientist: 1, precision: 1 }, tr: { narrativeDrive: 1 } },
                        { t: "“灵光一闪，我突然想换个更怪的打法。”", s: { chaos: 2 }, tr: { experimentation: 2 } }
                    ]
                }

            ],
            ending: `天已经完全亮了。<br><br>风开始慢慢变强，水面的变化越来越少。<br><br>你意识到：<br>今天的鱼，可能没有那么简单。`
        };

        let currentState = 'cover'; 
        let currentQIndex = 0;

        function render() {
            const app = document.getElementById('app');
            app.className = "max-w-2xl mx-auto min-h-screen flex flex-col p-6 py-12 " + (currentState === 'quiz' ? 'block' : 'justify-center');

            if (currentState === 'cover') {
                app.innerHTML = `
                    <div class="text-center fade-in">
                        <h2 class="text-blue-400 tracking-[0.4em] mb-4 uppercase text-xs font-semibold">${config.cover.sub}</h2>
                        <h1 class="serif text-6xl font-black mb-6 tracking-tighter text-white">${config.cover.title}</h1>
                        <p class="text-slate-400 mb-12 font-light">${config.cover.desc}</p>
                        <button onclick="changeState('intro')" class="px-10 py-4 bg-white text-slate-900 rounded-full hover:scale-105 transition-all font-bold text-sm tracking-widest uppercase">进入档案</button>
                    </div>`;
            } else if (currentState === 'intro') {
                app.innerHTML = `
                    <div class="fade-in max-w-md mx-auto flex flex-col items-center">
                        <h2 class="serif text-3xl font-bold mb-8 text-white text-center">${config.intro.title}</h2>
                        <div class="bg-white/5 border border-white/10 p-8 rounded-3xl mb-10 text-slate-300 leading-relaxed text-sm w-full">
                            ${config.intro.content}
                        </div>
                        <button onclick="changeState('chapter_start')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">我准备好了 →</button>
                    </div>`;
            } else if (currentState === 'chapter_start') {
                app.innerHTML = `
                    <div class="text-center fade-in">
                        <h2 class="text-blue-400 tracking-[0.2em] mb-4 uppercase text-sm font-semibold">${config.chapter}</h2>
                        <h1 class="serif text-5xl font-black mb-12 tracking-tight text-white">${config.chapterTitle}</h1>
                        <button onclick="changeState('narrative')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase">开始第一章</button>
                    </div>`;
            } else if (currentState === 'narrative') {
                app.innerHTML = `
                    <div class="fade-in flex flex-col items-start">
                        <p class="serif text-xl leading-relaxed text-slate-200 mb-12">${config.opening}</p>
                        <button onclick="changeState('quiz')" class="nav-btn px-10 py-3.5 rounded-full font-bold text-xs tracking-widest uppercase self-center">握紧钓竿 →</button>
                    </div>`;
            } else if (currentState === 'quiz') {
                const q = config.questions[currentQIndex];
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Phase: Arrival</span>
                            <span class="text-[10px] text-slate-500 font-mono">${currentQIndex + 1} / ${config.questions.length}</span>
                        </div>
                        <div class="h-1 w-full bg-white/5 mb-12 rounded-full overflow-hidden">
                            <div class="progress-bar h-full bg-blue-500" style="width: ${(currentQIndex+1)/config.questions.length*100}%"></div>
                        </div>
                        <h2 class="serif text-2xl font-bold mb-10 text-white leading-snug">${q.q}</h2>
                        <div class="space-y-4">
                            ${q.options.map((o, i) => `<button onclick="handleAnswer(${i})" class="option-btn w-full p-5 text-left rounded-2xl text-slate-300 hover:text-white transition-all text-sm leading-relaxed">${o.t}</button>`).join('')}
                        </div>
                    </div>`;
            } else if (currentState === 'end') {
                app.innerHTML = `
                    <div class="fade-in">
                        <p class="serif text-xl leading-relaxed text-slate-200 mb-12 italic">${config.ending}</p>
                        <div class="p-8 border border-white/10 rounded-3xl bg-white/5 backdrop-blur-sm">
                            <p class="text-xs text-slate-500 uppercase tracking-widest mb-6 border-b border-white/10 pb-4">第一章节数据分析（临时预览）</p>
                            <div class="grid grid-cols-2 gap-4">
                                ${Object.entries(scores.archetypes).filter(([_,v])=>v>0).map(([k,v])=>`<div class="text-xs font-mono"><span class="text-slate-500">${k}:</span> <span class="text-blue-400">${v}</span></div>`).join('')}
                            </div>
                        </div>
                        <p class="mt-12 text-slate-500 text-sm animate-pulse text-center italic">休息片刻，等待太阳升起...</p>
                    </div>`;
            }
        }

        window.changeState = (s) => { currentState = s; render(); };

                window.handleAnswer = (i) => {
            const opt = config.questions[currentQIndex].options[i];
            for (let k in opt.s) { scores.archetypes[k] += opt.s[k]; }
            for (let k in opt.tr) { scores.traits[k] += opt.tr[k]; }
            
            // 💡 核心逻辑：判断是否完成了某一章
            if (currentQIndex === 4) { 
                // 第5题做完（索引是4），展示第一章的结束，并准备把章节文案换成第二章
                config.ending = `太阳已经升高。<br><br>风变得更稳定了。<br><br>但鱼的反馈，却开始慢慢减少。<br><br>你意识到：<br>今天真正的 pattern，可能还没有完全出现。`;
                currentState = 'end';
                currentQIndex++; // 指向第6题
                render();
            } else if (currentQIndex === 9) {
                // 第10题做完（索引是9），这就是第二章结束了
                // 之后有了第三章，可以在这里如法炮制！
                config.ending = `中午的烈日开始灼烧水面。<br><br>那是做钓最艰难的慢时光...`; 
                currentState = 'end';
                currentQIndex++;
                render();
            } else if (currentQIndex < config.questions.length - 1) {
                currentQIndex++;
                render();
            } else {
                currentState = 'end';
                render();
            }
        };

        render();
    </script>
</body>
</html>

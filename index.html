    }

    .fade-in {

    }

    @keyframes fadeIn {
      from {
        opacity: 0;

      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    }

    .progress-bar {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>

 if (currentState === "chapter_end") {

    // =========================
    // 6. 交互函数
    // =========================

    function changeState(state) {
      currentState = state;
      render();
    }

    function startChapter(chapterNumber) {
      activeChapter = chapterNumber;
      currentQIndex = (chapterNumber - 1) * 5;
      currentState = "chapter_start";
      render();
    }

    function handleAnswer(optionIndex) {
      const question = questions[currentQIndex];
      const option = question.options[optionIndex];

      for (const key in option.s) {
        scores.archetypes[key] += option.s[key];
      }

      for (const key in option.tr) {
        if (scores.traits[key] === undefined) {
          scores.traits[key] = 0;
        }
        scores.traits[key] += option.tr[key];
      }

      const isEndOfChapter =
        currentQIndex === 4 ||
        currentQIndex === 9 ||
        currentQIndex === 14 ||
        currentQIndex === 19 ||
        currentQIndex === 24;

      if (isEndOfChapter) {
        currentState = "chapter_end";
      } else {
        currentQIndex++;
      }

      render();
    }

    function generateFinalReport() {
      currentState = "report";
      render();
    }

    // =========================
    // 7. 结果计算
    // =========================

    function calculateReport() {
  const sortedArch = Object.entries(scores.archetypes)
    .map(([name, val]) => ({ name, val }))
    .sort((a, b) => b.val - a.val);

  const sortedTraits = Object.entries(scores.traits)
    .map(([name, val]) => ({ name, val }))
    .sort((a, b) => b.val - a.val);

  const maxArchetypeScore = sortedArch.length > 0 ? sortedArch[0].val : 0;

  return {
    primary: sortedArch[0],
    secondary: sortedArch[1],
    topTraits: sortedTraits.slice(0, 3),
    lowestTrait: sortedTraits[sortedTraits.length - 1],
    allArchetypes: sortedArch,
    allTraits: sortedTraits,
    maxArchetypeScore
  };
}

    render();
